# Render Blueprint — ResumeIQ full-stack deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: resumeiq-api
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "./build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false          # you fill this in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: DATABASE_URL
        fromDatabase:
          name: resumeiq-db
          property: connectionString
      - key: DEBUG
        value: "false"

databases:
  - name: resumeiq-db
    databaseName: resumeiq
    plan: free
    region: oregon
